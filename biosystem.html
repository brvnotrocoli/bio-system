<style type="text/css">
    html{
        scroll-behavior: smooth;
    }

    /* grids  ------------------------------------------------------ */
    .align{
        width: 100%;
        height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .align-vertical {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: baseline;
    }
    .align-vertical-center{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .align-center { text-align: center; }
    .grid { display: flex; column-gap: 15px }
    .grid div { width: 100%; }
    .grid div img { display: block; }

    @media (orientation: portrait) {
        .grid { display: block; column-gap: 15px; }
    }

    /* buttons ------------------------------------------------------ */
    .gen-button-red{
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 400;
        padding-top: 15px;
        padding-bottom: 15px;
        padding-left: 30px;
        padding-right: 30px;
        border: 0;
        background-color: #e71316;
        color: white !important;
    }
    .gen-button-red:hover{
        background-color: #eee;
        color: #e71316;
    }
    .gen-button-mini-red{
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 400;
        padding-top: 5px;
        padding-bottom: 5px;
        padding-left: 45px;
        padding-right: 45px;
        border: 0;
        background-color: #e71316;
        color: white !important;
    }
    .gen-button-mini-red:hover{
        background-color: #eee;
        color: #e71316;
    }

    @media (orientation: portrait) {

    }

    /* links ------------------------------------------------------ */
    .gen-link{
        color: blue;
        text-decoration: underline !important;
        transition: all .5s ease-out;
    }
    .gen-link:hover{
        color: darkgrey;
        text-decoration: none;
    }

    /* normalize ------------------------------------------------------ */
    ul{
        margin-block-start: 0;
        margin-block-end: 0;
        padding-inline-start: 0;
    }
    h1, h2, h3, h4, h5, h6 {
        margin-block-start: 0;
        margin-block-end: 0;
        margin-inline-start: 0;
        margin-inline-end: 0;
        font-weight: normal;
    }

    /* fix aem errors ------------------------------------------------------ */
    .form_leftcol{
        display: flex;
        padding-top: 10px;
    }

    .radio, .checkbox{
        padding-left: 0;
        font-size: 12px;
    }
</style>

    @media (orientation: portrait) {
        .thermofisher-header{ height: 40px; }
    }

<div class="thermofisher-header"></div>

<!-- autoscroll motion -------------------------------------------------------->
<script type="text/javascript">
    function goToAndStop(id){
        const element = document.getElementById(id);
        const offset = 150;
        const position = element.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({
            top: position,
            behavior: "smooth"
        });
    }
</script>
