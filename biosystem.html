<style type="text/css">
    
    /* grids  ------------------------------------------------------ */
    .align{
        width: 100%;
        height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .align-vertical {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: baseline;
    }
    .align-center { text-align: center; }
    .grid { display: flex; column-gap: 15px }
    .grid div { width: 100%; }
    .grid div img { width: 100%; }

    @media (orientation: portrait) {
        .grid { display: block; column-gap: 15px; }
    }

    /* buttons ------------------------------------------------------ */
    .gen-button-red{
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 400;
        padding-top: 15px;
        padding-bottom: 15px;
        padding-left: 30px;
        padding-right: 30px;
        border: 0;
        background-color: #e71316;
        color: white;
    }
    .gen-button-red:hover{
        background-color: #eee;
        color: #e71316;
    }

    @media (orientation: portrait) {

    }

    /* links ------------------------------------------------------ */
    .gen-link-1{
        color: var(--lightblue);
        text-decoration: underline !important;
        transition: all .5s ease-out;
        line-height: 1;
    }
    .gen-link-1:hover{
        color: var(--grey);
        text-decoration: none;
    }

    /* normalize ------------------------------------------------------ */
    ul{
        margin-block-start: 0;
        margin-block-end: 0;
        padding-inline-start: 0;
    }
</style>

<!-- thermofisher header hack -------------------------------------------------------->
<style>
    .thermofisher-header{ height: 80px; }
    @media (orientation: portrait) {
        .thermofisher-header{ height: 40px; }
    }
</style>
<div class="thermofisher-header"></div>
