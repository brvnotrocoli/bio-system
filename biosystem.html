<style type="text/css">
    
    /* grids  ------------------------------------------------------ */

    .align{
        width: 100%;
        height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .align-vertical {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: baseline;
    }
    .align-center { text-align: center; }
    .grid { display: flex; column-gap: 15px }
    .grid div { width: 100%; }
    .grid div img { width: 100%; }

    @media (orientation: portrait) {
        .grid { display: block; column-gap: 15px; }
    }

    /* buttons ------------------------------------------------------ */
    .gen-button{
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 600;
        padding-top: var(--space1);
        padding-bottom: var(--space1);
        padding-left: var(--space1);
        padding-right: var(--space1);
        border: 0;
        background-color: var(--red);
        color: var(--white) !important;
        border-radius: 10px;
    }
    .gen-button:hover{
        background-color: var(--blue);
        color: var(--grey);
    }

    .gen-button-super {
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 600;
        padding-top: var(--space1);
        padding-bottom: var(--space1);
        padding-left: 10%;
        padding-right: 10%;
        border: 0;
        background-color: var(--red);
        color: var(--white) !important;
        border-radius: 10px;
    }
    .gen-button-super:hover{
        background-color: var(--blue);
        color: var(--grey);
    }

    @media (orientation: portrait) {

    }

    /* links ------------------------------------------------------ */
    .gen-link-1{
        color: var(--lightblue);
        text-decoration: underline !important;
        transition: all .5s ease-out;
        line-height: 1;
    }
    .gen-link-1:hover{
        color: var(--grey);
        text-decoration: none;
    }

    /* normalize ------------------------------------------------------ */
    ul{
        margin-block-start: 0;
        margin-block-end: 0;
        padding-inline-start: 0;
    }
</style>

    @media (orientation: portrait) {
