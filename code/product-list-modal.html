<style type="text/css">
    [id^="productlist"] {
        display: none;
    }

    body.modal-open {
        overflow: hidden;
        height: 100vh;
    }

    .modal-x {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9999;
        align-items: center;
        justify-content: center;
    }

    .modal-x.is-open {
        display: flex;
    }

    .modal-x {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        padding: 40px;
        z-index: 9999;
    }

    .modal-x {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        padding: 40px;
        z-index: 9999;
        overflow-y: auto;
    }

    .modal-x .modal-content {
        background: #fff;
        padding: 20px;
        max-width: 900px;
        margin: 0 auto;
        border-radius: 12px;

        max-height: calc(100vh - 80px);
        overflow-y: auto;
    }

    .modal-x .close {
        cursor: pointer;
        float: right;
        font-size: 16px;
        background-color: blue;
        color: whitesmoke;
        padding: 20px;
    }

    @media (orientation: portrait) {
        .modal-x{
            padding: 0;
        }
    }
</style>

<div class="modal-x" id="modal-x">
    <div class="modal-content">
        <button type="button" class="close" id="btn-fechar">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("modal-x");
        const btnFechar = document.getElementById("btn-fechar");
        const modalBody = document.getElementById("modal-body");

        // remove lists
        const lists = document.querySelectorAll(".productlist");
        lists.forEach((el, i) => {
            if (!el.id) el.id = `productlist-${i + 1}`;
        });

        function abrirModalComLista(index) {
            const original = document.getElementById(`productlist-${index}`);
            if (!original) return;

            // clone aem content
            const clone = original.cloneNode(true);
            clone.style.display = "block";
            modalBody.innerHTML = "";
            modalBody.appendChild(clone);

            modal.classList.add("is-open");
            document.body.classList.add("modal-open");
        }

        function fecharModal() {
            modal.classList.remove("is-open");
            document.body.classList.remove("modal-open");

            setTimeout(() => {
                modalBody.innerHTML = "";
            }, 200);
        }

        document.addEventListener("click", (e) => {
            const btn = e.target.closest(".btn-ver");
            if (btn) {
                e.preventDefault();
                abrirModalComLista(btn.dataset.target);
            }
        });

        btnFechar.addEventListener("click", fecharModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) fecharModal();
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && modal.classList.contains("is-open")) fecharModal();
        });
    });
</script>
